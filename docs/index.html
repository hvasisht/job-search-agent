<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Harini's Job Board</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; color: #1e293b; padding: 24px 16px; }
    header { max-width: 860px; margin: 0 auto 28px; border-bottom: 2px solid #e2e8f0; padding-bottom: 16px; }
    header h1 { font-size: 1.6rem; font-weight: 700; color: #0f172a; }
    header p { font-size: 0.85rem; color: #64748b; margin-top: 4px; }
    .filters { max-width: 860px; margin: 0 auto 20px; display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 5px 14px; border-radius: 9999px; border: 1px solid #cbd5e1; background: #fff; font-size: 0.8rem; cursor: pointer; color: #475569; transition: all 0.15s; }
    .filter-btn:hover, .filter-btn.active { background: #0f172a; color: #fff; border-color: #0f172a; }
    .grid { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 18px 20px; transition: box-shadow 0.15s; }
    .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .card-title { font-size: 1rem; font-weight: 600; color: #0f172a; line-height: 1.35; }
    .card-company { font-size: 0.85rem; color: #475569; margin-top: 3px; }
    .badge-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; align-items: center; }
    .badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 9999px; font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
    .badge-source { color: #fff; }
    .badge-h1b { background: #dcfce7; color: #166534; }
    .badge-no-h1b { background: #fee2e2; color: #991b1b; }
    .badge-loc { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    .score-ring { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 700; color: #fff; flex-shrink: 0; }
    .skills { margin-top: 10px; font-size: 0.78rem; color: #64748b; }
    .skills span { display: inline-block; background: #f1f5f9; border-radius: 4px; padding: 1px 7px; margin: 2px 3px 2px 0; }
    .reason { margin-top: 8px; font-size: 0.8rem; color: #64748b; font-style: italic; }
    .apply-btn { display: inline-block; margin-top: 12px; padding: 7px 18px; background: #0f172a; color: #fff; border-radius: 6px; text-decoration: none; font-size: 0.82rem; font-weight: 600; transition: background 0.15s; }
    .apply-btn:hover { background: #1e40af; }
    .empty { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 1rem; }
  </style>
</head>
<body>
  <header>
    <h1>🎯 Harini's Job Board</h1>
    <p>Updated May 07, 2026 at 02:57 UTC · 0 curated entry-level roles · Sources: None</p>
  </header>
  <div class="filters">
    <button class="filter-btn active" onclick="filterSource('all', event)">All</button>
    
    <button class="filter-btn" onclick="filterH1b(event)">H1-B Sponsors Only</button>
  </div>
  <div class="grid" id="grid">
    <p class="empty">No jobs found today — check back tomorrow.</p>
  </div>
  <script>
    let h1bOnly = false;
    let activeSource = 'all';
    function filterSource(src, e) {
      activeSource = src; h1bOnly = false;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      applyFilters();
    }
    function filterH1b(e) {
      h1bOnly = !h1bOnly; activeSource = 'all';
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.toggle('active', h1bOnly);
      applyFilters();
    }
    function applyFilters() {
      document.querySelectorAll('.card').forEach(card => {
        const srcOk = activeSource === 'all' || card.dataset.source === activeSource;
        const h1bOk = !h1bOnly || card.dataset.h1b === 'true';
        card.style.display = (srcOk && h1bOk) ? '' : 'none';
      });
    }
  </script>
</body>
</html>
