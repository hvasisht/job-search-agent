name: Daily Job Search

on:
  schedule:
    # Full run once per day at 9 AM UTC (includes LinkedIn + Indeed via Apify)
    - cron: "0 9 * * *"
    # Quick runs every 5 hours (free sources only — auto-detected by main.py)
    - cron: "0 14 * * *"
    - cron: "0 19 * * *"
    - cron: "0 0 * * *"
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      skip_apify:
        description: "Skip paid Apify sources (LinkedIn/Indeed)?"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run job search agent
        env:
          APIFY_API_TOKEN:   ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADZUNA_APP_ID:     ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:    ${{ secrets.ADZUNA_APP_KEY }}
          SKIP_APIFY:        ${{ github.event.inputs.skip_apify || 'false' }}
        run: python scripts/main.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/latest_jobs.json
          git diff --staged --quiet || git commit -m "chore: update job listings $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
